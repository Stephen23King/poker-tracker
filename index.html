<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #000;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
    }

    .bg-parallax {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 200vh;
      z-index: 0;
      filter: brightness(0.45);
      will-change: transform;
      background-image:
        url('https://media.base44.com/images/public/69bf18975ac1b14fde421449/e701452f9_generated_image.png'),
        url('https://media.base44.com/images/public/69bf18975ac1b14fde421449/e701452f9_generated_image.png');
      background-size: 100% 50%;
      background-repeat: no-repeat;
      background-position: center 0%, center 100%;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    .header-banner {
      position: relative;
      width: 100%;
      max-height: 340px;
      overflow: hidden;
      border-radius: 0 0 12px 12px;
      margin-bottom: 22px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.9),
        0 0 10px 4px rgba(0,0,0,0.85),
        0 0 22px 8px rgba(0,0,0,0.6);
    }

    .header-banner img.banner-bg {
      width: 100%;
      height: 340px;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .header-banner .title-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(0,0,0,0.42));
    }

    .title-overlay span {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(72px, 14vw, 130px);
      letter-spacing: 0.03em;
      line-height: 0.88;
      color: #fff;
      display: block;
      transform: scaleY(1.12);
      text-shadow:
        0 0  8px rgba(255,255,255,0.95),
        0 0 18px rgba(255,255,255,0.80),
        0 0 35px rgba(255,255,255,0.60),
        0 0 60px rgba(255,255,255,0.35),
        0 0 90px rgba(255,255,255,0.18);
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      margin: 0 0 28px;
    }

    .pagination-bar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 50px;
      background: rgba(15, 15, 15, 0.88);
      border: 1px solid #2a2a2a;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.65),
        0 10px 24px rgba(0,0,0,0.30);
    }

    .page-nav-btn {
      min-width: 42px;
      height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1.5px solid #666;
      background: linear-gradient(135deg, #161616, #232323);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 0 rgba(0,0,0,0.5);
      transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.15s, color 0.15s, background 0.15s;
      position: relative;
      top: 0;
    }

    .page-nav-btn:hover:not(:disabled) {
      border-color: #c0392b;
      color: #fff;
      background: linear-gradient(135deg, #232323, #2f2f2f);
    }

    .page-nav-btn:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.5);
      top: 3px;
    }

    .page-nav-btn:disabled {
      cursor: default;
      opacity: 0.42;
      color: #888;
      border-color: #444;
      background: linear-gradient(135deg, #111, #191919);
    }

    .page-current {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0 2px;
      white-space: nowrap;
      text-shadow:
        0 0  6px rgba(255,255,255,0.25),
        0 0 16px rgba(255,255,255,0.10);
    }

    .page-dots {
      color: #888;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      user-select: none;
    }

    .page-jump-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .page-input {
      width: 72px;
      height: 38px;
      border-radius: 999px;
      border: 1.5px solid #555;
      background: rgba(0,0,0,0.35);
      color: #fff;
      text-align: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .page-input:focus {
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192,57,43,0.16);
    }

    .page-go-btn {
      min-width: 52px;
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1.5px solid #666;
      background: linear-gradient(135deg, #c0392b, #922b21);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 0 rgba(0,0,0,0.5);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s ease;
      position: relative;
      top: 0;
    }

    .page-go-btn:hover {
      filter: brightness(1.08);
    }

    .page-go-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.5);
      top: 3px;
    }

    .page-meta {
      color: #999;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .session-header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 12px;
    }

    .session-date-input {
      background: transparent;
      border: none;
      border-bottom: 4px solid #ffffff;
      color: #ffffff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      outline: none;
      width: min(60%, 516px);
      min-width: 220px;
      padding: 4px 6px 6px;
      transition: border-color 0.2s, color 0.2s;
      text-shadow:
        0 0  6px rgba(255,255,255,0.7),
        0 0 14px rgba(255,255,255,0.4),
        0 0 28px rgba(255,255,255,0.2);
    }

    .session-date-input:focus {
      border-bottom-color: rgba(255,255,255,0.85);
    }

    .session-date-input::placeholder {
      color: #aaaaaa;
      font-weight: 600;
      text-shadow: none;
    }

    .session-btns {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-press {
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border-radius: 6px;
      padding: 5px 13px;
      white-space: nowrap;
      user-select: none;
      box-shadow: 0 4px 0 rgba(0,0,0,0.5);
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s, color 0.15s, border-color 0.15s;
      position: relative;
      top: 0;
    }

    .btn-press:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.5);
      top: 3px;
    }

    .btn-remove {
      background: transparent;
      border: 1.5px solid #555;
      color: #888;
    }

    .btn-remove:hover {
      border-color: #e05050;
      color: #e05050;
    }

    .btn-lock {
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border: 1.5px solid #666;
      color: #bbb;
    }

    .btn-lock:hover {
      border-color: #c9a227;
      color: #f0d060;
    }

    .btn-lock.locked {
      background: linear-gradient(135deg, #b8860b, #c9a227, #e8c84a, #c9a227);
      border: 1.5px solid #e8c84a;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      box-shadow: 0 4px 0 rgba(0,0,0,0.5), 0 0 10px rgba(201,162,39,0.4);
    }

    .btn-lock.locked:hover {
      background: linear-gradient(135deg, #d4a017, #e8c84a, #fde070, #e8c84a);
    }

    .table-card {
      background: rgba(18, 18, 18, 0.88);
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .table-card table {
      width: 100%;
      border-collapse: collapse;
    }

    .table-card thead tr { background: #c0392b; }

    .table-card thead th {
      padding: 14px 18px;
      text-align: left;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #fff;
    }

    .table-card tbody tr {
      border-bottom: 1px solid #2a2a2a;
      transition: background 0.15s;
    }

    .table-card tbody tr:last-child { border-bottom: none; }
    .table-card tbody tr:hover { background: rgba(192,57,43,0.12); }

    .table-card tbody td {
      padding: 13px 18px;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      vertical-align: middle;
    }

    .table-card tbody td:first-child { color: #ccc; width: 48%; }
    .table-card tbody td:last-child  { color: #fff; }

    .table-card tbody td input {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid rgba(192,57,43,0.5);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      width: 100%;
      outline: none;
      padding: 2px 4px;
      transition: border-color 0.2s;
    }

    .table-card tbody td input:focus  { border-bottom-color: #e05050; }
    .table-card tbody td input::placeholder { color: #555; font-weight: 400; }

    .table-card.is-locked td input {
      pointer-events: none;
      color: #aaa;
      border-bottom-color: transparent;
    }

    .table-card.is-locked .time-mask-input,
    .table-card.is-locked .meridiem-select {
      pointer-events: none;
    }

    .profit-positive { color: #4caf50 !important; }
    .profit-negative { color: #e05050 !important; }

    .calc-cell {
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }

    .calc-cell.empty {
      color: #555 !important;
      font-weight: 400;
    }

    .time-entry-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 220px;
    }

    .time-mask-input {
      width: 92px !important;
      min-width: 92px;
      text-align: left;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.08em;
      caret-color: #fff;
    }

    .time-mask-input.empty {
      color: #777 !important;
    }

    .meridiem-select {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid rgba(192,57,43,0.5);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: lowercase;
      outline: none;
      padding: 2px 18px 2px 4px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      min-width: 56px;
      background-image:
        linear-gradient(45deg, transparent 50%, #aaa 50%),
        linear-gradient(135deg, #aaa 50%, transparent 50%);
      background-position:
        calc(100% - 11px) calc(50% - 1px),
        calc(100% - 6px) calc(50% - 1px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .meridiem-select option {
      background: #ffffff;
      color: #000000;
    }

    .table-card.is-locked .meridiem-select {
      color: #aaa;
      border-bottom-color: transparent;
      background-image:
        linear-gradient(45deg, transparent 50%, #777 50%),
        linear-gradient(135deg, #777 50%, transparent 50%);
    }

    .time-mask-input:not(.empty),
    .meridiem-select.has-value {
      color: #fff;
    }

    .add-session-wrap {
      display: flex;
      justify-content: center;
      margin: 28px 0 14px;
    }

    .btn-add-session {
      background: linear-gradient(135deg, #c0392b, #922b21);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 18px rgba(192,57,43,0.45);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    .btn-add-session:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(192,57,43,0.6);
    }

    .btn-add-session:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: 0 4px 18px rgba(192,57,43,0.2);
    }

    .btn-add-session .plus-icon { font-size: 1.5rem; line-height: 1; }

    .footer {
      text-align: center;
      color: #444;
      font-size: 0.82rem;
      margin-top: 50px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 700px) {
      .session-header-row {
        flex-direction: column;
        align-items: stretch;
      }

      .session-date-input {
        width: 100%;
      }

      .session-btns {
        justify-content: flex-start;
      }

      .pagination-bar {
        border-radius: 20px;
        padding: 12px;
      }

      .page-meta {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="bg-parallax" id="bgParallax"></div>

  <div class="content">

    <div class="header-banner">
      <img class="banner-bg"
           src="https://media.base44.com/images/public/69bf18975ac1b14fde421449/d3e7669ab_generated_image.png"
           alt="Poker Table" />
      <div class="title-overlay">
        <span>POKER</span>
        <span>TRACKER</span>
      </div>
    </div>

    <div id="pagination-top"></div>

    <div id="sessions-container"></div>

    <div class="add-session-wrap">
      <button class="btn-add-session" id="addSessionBtn">
        <span class="plus-icon">＋</span> Add Session
      </button>
    </div>

    <div id="pagination-bottom"></div>

    <div class="footer">
      Made by Stephen Johnson &amp; LeRoi Profit<br />© 2026 Poker Tracker App
    </div>
  </div>

  <script>
    const bg = document.getElementById('bgParallax');
    let bgOffset = 0, lastTime = null;
    const SCROLL_SPEED = 0.006;

    function animateBg(ts) {
      if (!lastTime) lastTime = ts;
      const delta = ts - lastTime;
      lastTime = ts;
      bgOffset += window.innerHeight * SCROLL_SPEED * (delta / 1000);
      if (bgOffset >= window.innerHeight) bgOffset -= window.innerHeight;
      bg.style.transform = `translateY(-${bgOffset}px)`;
      requestAnimationFrame(animateBg);
    }
    requestAnimationFrame(animateBg);

    const STORAGE_KEY = 'pokerTracker_sessions_v7';
    const MAX_TEXT_LEN = 50;
    const MAX_SESSIONS = 500;
    const SESSIONS_PER_PAGE = 20;

    const sfx = {
      newTable: new Audio('newtablefx.mp3'),
      delete: new Audio('deletefx.mp3'),
      lock: new Audio('locksfx.mp3')
    };

    sfx.newTable.volume = 1.0;
    sfx.lock.volume = 1.0;
    sfx.delete.volume = 0.5;

    const sfxCooldowns = {
      newTable: 0,
      delete: 0,
      lock: 0
    };

    const SFX_COOLDOWN_MS = 250;

    function playSfx(name) {
      const audio = sfx[name];
      if (!audio) return;

      const now = Date.now();
      if (now - sfxCooldowns[name] < SFX_COOLDOWN_MS) return;

      sfxCooldowns[name] = now;

      try {
        audio.pause();
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch {}
    }

    function emptySession() {
      return {
        id: Date.now() + Math.random(),
        locked: false,
        date: '',
        buyIn: '',
        cashout: '',
        startTimeDigits: '',
        startMeridiem: 'am',
        endTimeDigits: '',
        endMeridiem: 'am',
        breakTimeDigits: ''
      };
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (!parsed || !Array.isArray(parsed)) return null;
        return parsed.slice(0, MAX_SESSIONS).map(migrateSession);
      } catch {
        return null;
      }
    }

    function saveSessions(s) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s.slice(0, MAX_SESSIONS)));
      } catch (e) {
        console.warn(e);
      }
    }

    function migrateSession(s) {
      const base = emptySession();

      if (s && typeof s === 'object') {
        base.id = s.id ?? base.id;
        base.locked = !!s.locked;
        base.date = s.date ?? '';
        base.buyIn = s.buyIn ?? '';
        base.cashout = s.cashout ?? '';

        if ('startTimeDigits' in s) {
          base.startTimeDigits = only4Digits(s.startTimeDigits);
          base.startMeridiem = normalizeMeridiem(s.startMeridiem);
        } else {
          const parsedStart = parseLegacyClockString(s.startTime || '');
          base.startTimeDigits = parsedStart.digits;
          base.startMeridiem = parsedStart.meridiem;
        }

        if ('endTimeDigits' in s) {
          base.endTimeDigits = only4Digits(s.endTimeDigits);
          base.endMeridiem = normalizeMeridiem(s.endMeridiem);
        } else {
          const parsedEnd = parseLegacyClockString(s.endTime || '');
          base.endTimeDigits = parsedEnd.digits;
          base.endMeridiem = parsedEnd.meridiem;
        }

        if ('breakTimeDigits' in s) {
          base.breakTimeDigits = only4Digits(s.breakTimeDigits);
        } else {
          base.breakTimeDigits = parseLegacyBreakDigits(s.breakTime || '');
        }
      }

      return base;
    }

    function parseLegacyClockString(str) {
      const clean = String(str || '').trim().toLowerCase();
      if (!clean) return { digits: '', meridiem: 'am' };

      let m = clean.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/i);
      if (m) {
        const hh = m[1].padStart(2, '0');
        const mm = m[2];
        return { digits: `${hh}${mm}`, meridiem: normalizeMeridiem(m[3]) };
      }

      m = clean.match(/^(\d{1,2}):(\d{2})$/);
      if (m) {
        const hh = m[1].padStart(2, '0');
        const mm = m[2];
        const hour = parseInt(hh, 10);
        const meridiem = hour >= 12 ? 'pm' : 'am';
        let h12 = hour % 12;
        if (h12 === 0) h12 = 12;
        return { digits: `${String(h12).padStart(2, '0')}${mm}`, meridiem };
      }

      return { digits: '', meridiem: 'am' };
    }

    function parseLegacyBreakDigits(str) {
      return String(str || '').replace(/\D/g, '').slice(0, 4);
    }

    function normalizeMeridiem(v) {
      return String(v).toLowerCase() === 'pm' ? 'pm' : 'am';
    }

    function only4Digits(v) {
      return String(v || '').replace(/\D/g, '').slice(0, 4);
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function formatMaskedDigits(digits) {
      const raw = only4Digits(digits);
      if (!raw) return '00:00';
      const padded = raw.padStart(4, '0');
      return `${padded.slice(0, 2)}:${padded.slice(2)}`;
    }

    function parseClockMinutes(digits, meridiem) {
      const raw = only4Digits(digits);
      if (!raw) return null;

      const padded = raw.padStart(4, '0');
      let hour = parseInt(padded.slice(0, 2), 10);
      const minute = parseInt(padded.slice(2), 10);

      if (minute < 0 || minute > 59) return null;
      if (hour < 1 || hour > 12) return null;

      const mer = normalizeMeridiem(meridiem);
      if (mer === 'am') {
        if (hour === 12) hour = 0;
      } else {
        if (hour !== 12) hour += 12;
      }

      return hour * 60 + minute;
    }

    function parseDurationMinutes(digits) {
      const raw = only4Digits(digits);
      if (!raw) return null;

      const padded = raw.padStart(4, '0');
      const hour = parseInt(padded.slice(0, 2), 10);
      const minute = parseInt(padded.slice(2), 10);

      if (minute < 0 || minute > 59) return null;
      return (hour * 60) + minute;
    }

    function calcTotalMinutes(startDigits, startMeridiem, endDigits, endMeridiem) {
      const start = parseClockMinutes(startDigits, startMeridiem);
      const end = parseClockMinutes(endDigits, endMeridiem);
      if (start === null || end === null) return null;

      let diff = end - start;
      if (diff < 0) diff += 24 * 60;
      if (diff === 0) return null;

      return diff;
    }

    function calcPlayedMinutes(startDigits, startMeridiem, endDigits, endMeridiem, breakDigits) {
      const total = calcTotalMinutes(startDigits, startMeridiem, endDigits, endMeridiem);
      const breakMin = parseDurationMinutes(breakDigits);

      if (total === null || breakMin === null) return null;

      const played = total - breakMin;
      if (played < 0) return null;

      return played;
    }

    function formatHours(totalMin) {
      if (totalMin === null) return null;

      const hrsRounded = Math.round((totalMin / 60) * 10) / 10;
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;

      let written = '';
      if (h > 0 && m > 0) written = `${h} hr${h !== 1 ? 's' : ''} ${m} min${m !== 1 ? 's' : ''}`;
      else if (h > 0) written = `${h} hr${h !== 1 ? 's' : ''}`;
      else written = `${m} min${m !== 1 ? 's' : ''}`;

      return `${hrsRounded} hrs / (${written})`;
    }

    function calcProfit(b, c) {
      const bv = parseFloat(b), cv = parseFloat(c);
      if (isNaN(bv) || isNaN(cv)) return '';
      const p = cv - bv;
      return (p >= 0 ? '+$' : '-$') + Math.abs(p).toFixed(0);
    }

    function profitClass(b, c) {
      const bv = parseFloat(b), cv = parseFloat(c);
      if (isNaN(bv) || isNaN(cv)) return '';
      return (cv - bv) >= 0 ? 'profit-positive' : 'profit-negative';
    }

    let sessions = loadSessions() || [emptySession()];
    let currentPage = 1;

    function totalPages() {
      return Math.max(1, Math.ceil(sessions.length / SESSIONS_PER_PAGE));
    }

    function clampPage(page) {
      const total = totalPages();
      const num = parseInt(page, 10);
      if (Number.isNaN(num)) return currentPage;
      return Math.min(Math.max(num, 1), total);
    }

    function getPageSlice() {
      const start = (currentPage - 1) * SESSIONS_PER_PAGE;
      const end = start + SESSIONS_PER_PAGE;
      return sessions.slice(start, end).map((session, localIdx) => ({
        session,
        actualIndex: start + localIdx
      }));
    }

    function renderPagination(targetId) {
      const target = document.getElementById(targetId);
      const total = totalPages();
      const atFirst = currentPage <= 1;
      const atLast = currentPage >= total;

      target.innerHTML = `
        <div class="pagination-wrap">
          <div class="pagination-bar">
            <button class="page-nav-btn" data-page-action="prev" ${atFirst ? 'disabled' : ''} aria-label="Previous page">‹</button>
            <span class="page-current">${currentPage}</span>
            <span class="page-dots">...</span>
            <div class="page-jump-wrap">
              <input
                class="page-input"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                spellcheck="false"
                maxlength="3"
                placeholder="#"
                data-page-input="${targetId}"
              />
              <button class="page-go-btn" data-page-action="go" data-target-input="${targetId}">Go</button>
            </div>
            <button class="page-nav-btn" data-page-action="next" ${atLast ? 'disabled' : ''} aria-label="Next page">›</button>
            <span class="page-meta">Page ${currentPage} / ${total} • ${sessions.length} / ${MAX_SESSIONS} Sessions</span>
          </div>
        </div>
      `;
    }

    function render() {
      if (!sessions.length) {
        sessions = [emptySession()];
      }

      currentPage = clampPage(currentPage);
      saveSessions(sessions);

      renderPagination('pagination-top');
      renderPagination('pagination-bottom');

      const container = document.getElementById('sessions-container');
      container.innerHTML = '';

      const pageItems = getPageSlice();

      pageItems.forEach(({ session: s, actualIndex }) => {
        const profit = calcProfit(s.buyIn, s.cashout);
        const pClass = profitClass(s.buyIn, s.cashout);
        const locked = !!s.locked;
        const ro = locked ? 'readonly' : '';
        const disabled = locked ? 'disabled' : '';
        const lockLbl = locked ? 'Unlock' : 'Lock';
        const lockCls = locked ? 'btn-press btn-lock locked' : 'btn-press btn-lock';

        const totalMin = calcTotalMinutes(s.startTimeDigits, s.startMeridiem, s.endTimeDigits, s.endMeridiem);
        const totalDisplay = formatHours(totalMin);

        const playedMin = calcPlayedMinutes(s.startTimeDigits, s.startMeridiem, s.endTimeDigits, s.endMeridiem, s.breakTimeDigits);
        const playedDisplay = formatHours(playedMin);

        const wrap = document.createElement('div');
        wrap.innerHTML = `
          <div class="session-header-row">
            <input
              class="session-date-input"
              type="text"
              value="${esc(s.date)}"
              placeholder="e.g. August 1st"
              data-field="date"
              data-idx="${actualIndex}"
              maxlength="30"
              ${ro}
            />
            <div class="session-btns">
              ${sessions.length > 1
                ? `<button class="btn-press btn-remove" data-idx="${actualIndex}" data-action="remove">✕ Remove</button>`
                : ''}
              <button class="${lockCls}" data-idx="${actualIndex}" data-action="lock">${lockLbl}</button>
            </div>
          </div>

          <div class="table-card${locked ? ' is-locked' : ''}">
            <table>
              <thead><tr><th>Log</th><th>Breakdown</th></tr></thead>
              <tbody>
                <tr>
                  <td>Start Time</td>
                  <td>
                    <div class="time-entry-wrap">
                      <input
                        type="text"
                        class="time-mask-input${s.startTimeDigits ? '' : ' empty'}"
                        value="${formatMaskedDigits(s.startTimeDigits)}"
                        data-kind="clock"
                        data-field="startTimeDigits"
                        data-idx="${actualIndex}"
                        inputmode="numeric"
                        autocomplete="off"
                        spellcheck="false"
                        ${ro}
                      />
                      <select
                        class="meridiem-select has-value"
                        data-field="startMeridiem"
                        data-idx="${actualIndex}"
                        ${disabled}
                      >
                        <option value="am" ${s.startMeridiem === 'am' ? 'selected' : ''}>am</option>
                        <option value="pm" ${s.startMeridiem === 'pm' ? 'selected' : ''}>pm</option>
                      </select>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>End Time</td>
                  <td>
                    <div class="time-entry-wrap">
                      <input
                        type="text"
                        class="time-mask-input${s.endTimeDigits ? '' : ' empty'}"
                        value="${formatMaskedDigits(s.endTimeDigits)}"
                        data-kind="clock"
                        data-field="endTimeDigits"
                        data-idx="${actualIndex}"
                        inputmode="numeric"
                        autocomplete="off"
                        spellcheck="false"
                        ${ro}
                      />
                      <select
                        class="meridiem-select has-value"
                        data-field="endMeridiem"
                        data-idx="${actualIndex}"
                        ${disabled}
                      >
                        <option value="am" ${s.endMeridiem === 'am' ? 'selected' : ''}>am</option>
                        <option value="pm" ${s.endMeridiem === 'pm' ? 'selected' : ''}>pm</option>
                      </select>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>Buy-In</td>
                  <td><input type="text" placeholder="e.g. 100" value="${esc(s.buyIn)}" data-field="buyIn" data-idx="${actualIndex}" maxlength="${MAX_TEXT_LEN}" ${ro} /></td>
                </tr>
                <tr>
                  <td>Cashout</td>
                  <td><input type="text" placeholder="e.g. 250" value="${esc(s.cashout)}" data-field="cashout" data-idx="${actualIndex}" maxlength="${MAX_TEXT_LEN}" ${ro} /></td>
                </tr>
                <tr>
                  <td>Profit</td>
                  <td class="${profit ? pClass : 'calc-cell empty'}" style="font-size:1.1rem;" data-profit="${actualIndex}">
                    ${profit || 'auto-calculated'}
                  </td>
                </tr>
                <tr>
                  <td>Break Time</td>
                  <td>
                    <div class="time-entry-wrap">
                      <input
                        type="text"
                        class="time-mask-input${s.breakTimeDigits ? '' : ' empty'}"
                        value="${formatMaskedDigits(s.breakTimeDigits)}"
                        data-kind="duration"
                        data-field="breakTimeDigits"
                        data-idx="${actualIndex}"
                        inputmode="numeric"
                        autocomplete="off"
                        spellcheck="false"
                        ${ro}
                      />
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>Hours Played</td>
                  <td class="calc-cell${playedDisplay ? '' : ' empty'}" data-hours-played="${actualIndex}">
                    ${playedDisplay || 'auto-calculated'}
                  </td>
                </tr>
                <tr>
                  <td>Total Hours</td>
                  <td class="calc-cell${totalDisplay ? '' : ' empty'}" data-total-hours="${actualIndex}">
                    ${totalDisplay || 'auto-calculated'}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        `;
        container.appendChild(wrap);
      });

      const addBtn = document.getElementById('addSessionBtn');
      const atMax = sessions.length >= MAX_SESSIONS;
      addBtn.disabled = atMax;
      addBtn.title = atMax ? `Maximum of ${MAX_SESSIONS} sessions reached.` : '';

      attachEvents();
    }

    function attachEvents() {
      const container = document.getElementById('sessions-container');

      container.querySelectorAll('input[data-field]:not(.time-mask-input)').forEach(el => {
        el.addEventListener('input', onStandardInput);
      });

      container.querySelectorAll('.meridiem-select').forEach(el => {
        el.addEventListener('change', onMeridiemChange);
      });

      container.querySelectorAll('.time-mask-input').forEach(el => {
        el.addEventListener('keydown', onMaskedTimeKeydown);
        el.addEventListener('focus', moveCaretToEnd);
        el.addEventListener('click', moveCaretToEnd);
        el.addEventListener('paste', onMaskedPaste);
      });

      container.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx, 10);

          if (btn.dataset.action === 'remove') {
            if (sessions.length <= 1) return;
            playSfx('delete');
            sessions.splice(idx, 1);
            currentPage = clampPage(currentPage);
            render();
          } else if (btn.dataset.action === 'lock') {
            playSfx('lock');
            sessions[idx].locked = !sessions[idx].locked;
            render();
          }
        });
      });

      document.querySelectorAll('[data-page-action="prev"]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (currentPage <= 1) return;
          currentPage -= 1;
          render();
          scrollToTopPagination();
        });
      });

      document.querySelectorAll('[data-page-action="next"]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (currentPage >= totalPages()) return;
          currentPage += 1;
          render();
          scrollToTopPagination();
        });
      });

      document.querySelectorAll('[data-page-action="go"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.dataset.targetInput;
          goToTypedPage(targetId);
        });
      });

      document.querySelectorAll('.page-input').forEach(input => {
        input.addEventListener('input', () => {
          input.value = input.value.replace(/\D/g, '').slice(0, 3);
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            goToTypedPage(input.dataset.pageInput);
          }
        });
      });
    }

    function goToTypedPage(targetId) {
      const input = document.querySelector(`[data-page-input="${targetId}"]`);
      if (!input) return;

      const raw = input.value.trim();
      if (!raw) return;

      const requested = parseInt(raw, 10);
      if (Number.isNaN(requested)) {
        input.value = '';
        return;
      }

      const nextPage = clampPage(requested);
      if (nextPage === currentPage) {
        input.value = '';
        return;
      }

      currentPage = nextPage;
      render();
      scrollToTopPagination();
    }

    function scrollToTopPagination() {
      const topPager = document.getElementById('pagination-top');
      if (topPager) {
        topPager.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function onStandardInput(e) {
      const field = e.target.dataset.field;
      const idx = parseInt(e.target.dataset.idx, 10);
      sessions[idx][field] = e.target.value;
      saveSessions(sessions);
      updateComputedFields(idx);
    }

    function onMeridiemChange(e) {
      const field = e.target.dataset.field;
      const idx = parseInt(e.target.dataset.idx, 10);
      sessions[idx][field] = normalizeMeridiem(e.target.value);
      saveSessions(sessions);
      updateComputedFields(idx);
    }

    function moveCaretToEnd(e) {
      const input = e.target;
      requestAnimationFrame(() => {
        const len = input.value.length;
        try {
          input.setSelectionRange(len, len);
        } catch {}
      });
    }

    function onMaskedTimeKeydown(e) {
      const input = e.target;
      const idx = parseInt(input.dataset.idx, 10);
      const field = input.dataset.field;

      if (sessions[idx].locked) {
        e.preventDefault();
        return;
      }

      const key = e.key;
      let raw = only4Digits(sessions[idx][field]);

      const allowedNavKeys = ['Tab', 'Shift', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'];
      if (allowedNavKeys.includes(key)) return;

      if (key === 'Backspace') {
        e.preventDefault();
        raw = raw.slice(0, -1);
        setMaskedField(idx, field, raw, input);
        return;
      }

      if (key === 'Delete') {
        e.preventDefault();
        raw = '';
        setMaskedField(idx, field, raw, input);
        return;
      }

      if (/^\d$/.test(key)) {
        e.preventDefault();
        raw = (raw + key).slice(-4);
        setMaskedField(idx, field, raw, input);
        return;
      }

      e.preventDefault();
    }

    function onMaskedPaste(e) {
      e.preventDefault();
      const input = e.target;
      const idx = parseInt(input.dataset.idx, 10);
      const field = input.dataset.field;

      if (sessions[idx].locked) return;

      const pasted = (e.clipboardData || window.clipboardData).getData('text') || '';
      const raw = only4Digits(pasted);
      setMaskedField(idx, field, raw, input);
    }

    function setMaskedField(idx, field, raw, inputEl) {
      sessions[idx][field] = only4Digits(raw);
      saveSessions(sessions);

      if (inputEl) {
        inputEl.value = formatMaskedDigits(sessions[idx][field]);
        inputEl.classList.toggle('empty', !sessions[idx][field]);
        moveCaretToEnd({ target: inputEl });
      }

      updateComputedFields(idx);
    }

    function updateComputedFields(idx) {
      const s = sessions[idx];

      const profitTd = document.querySelector(`td[data-profit="${idx}"]`);
      if (profitTd) {
        const profit = calcProfit(s.buyIn, s.cashout);
        profitTd.className = profit ? profitClass(s.buyIn, s.cashout) : 'calc-cell empty';
        profitTd.style.fontSize = '1.1rem';
        profitTd.textContent = profit || 'auto-calculated';
      }

      const totalTd = document.querySelector(`td[data-total-hours="${idx}"]`);
      if (totalTd) {
        const totalMin = calcTotalMinutes(s.startTimeDigits, s.startMeridiem, s.endTimeDigits, s.endMeridiem);
        const totalDisplay = formatHours(totalMin);
        totalTd.className = 'calc-cell' + (totalDisplay ? '' : ' empty');
        totalTd.textContent = totalDisplay || 'auto-calculated';
      }

      const playedTd = document.querySelector(`td[data-hours-played="${idx}"]`);
      if (playedTd) {
        const playedMin = calcPlayedMinutes(s.startTimeDigits, s.startMeridiem, s.endTimeDigits, s.endMeridiem, s.breakTimeDigits);
        const playedDisplay = formatHours(playedMin);
        playedTd.className = 'calc-cell' + (playedDisplay ? '' : ' empty');
        playedTd.textContent = playedDisplay || 'auto-calculated';
      }
    }

    function addSession() {
      if (sessions.length >= MAX_SESSIONS) return;
      playSfx('newTable');
      sessions.push(emptySession());
      currentPage = totalPages();
      render();

      setTimeout(() => {
        const last = document.getElementById('sessions-container').lastElementChild;
        if (last) last.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 80);
    }

    document.getElementById('addSessionBtn').addEventListener('click', addSession);

    render();
  </script>
</body>
</html>
